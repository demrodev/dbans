# ============================================================
#                      INSPECT (INSPECT)
# ============================================================

inspect_usage: "%prefix%&cUsage: /inspect <player>"
inspect.header: "%prefix%&6=== Active punishments of %target% ==="
inspect.entry_ban: " &7- &cBan #%id% &8| &7Server: %server% &8| &7Reason: %reason% &8| &7Until: %expires%"
