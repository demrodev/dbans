tempmute_expired: "&aYour temporary mute has expired. You can now chat again."

# Broadcasts
mute_broadcast: "%prefix%&e❱ %sender% muted %target% permanently. &6Reason: %reason% (ID: #%id%)"
tempmute_broadcast: "%prefix%&e❱ %sender% temporarily muted %target% for %duration%. &6Reason: %reason% (ID: #%id%)"
unmute_broadcast: "%prefix%&a❱ %sender% unmuted player %target% (ID: #%id%)."

# Player messages
mute_player: "&c✖ You have been muted by %sender% permanently. Reason: %reason%\nServer: %server%\nID: #%id%"
