inspect.entry_permanent: " &7- &c%type% #%id% &8| &7Server: %server% &8| &7Reason: %reason% &8| &cPermanent"
inspect.entry_jail: " &7- &6Jail #%id% &8| &7Server: %server% &8| &7Reason: %reason% &8| &7Until: %expires%"
inspect.none: "&aPlayer %target% has no active punishments."
inspect.footer: "&7=== Use /droppunish <ID> to delete ==="

