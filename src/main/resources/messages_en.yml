# ============================================================
#                      BANS (BAN / TEMPBAN)
# ============================================================

ban_already: "%prefix%&cPlayer %target% is already banned."
not_banned: "%prefix%&cPlayer %target% is not banned."

# Broadcasts
ban_broadcast: "%prefix%&c❱ %sender% banned %target% permanently. &6Reason: %reason% (ID: #%id%)"
tempban_broadcast: "%prefix%&c❱ %sender% temporarily banned %target% for %duration%. &6Reason: %reason% (ID: #%id%)"
unban_broadcast: "%prefix%&a❱ %sender% unbanned player %target% (ID: #%id%)."

# Player messages
ban_player: "&c✖ You have been permanently banned.\nReason: %reason%\nAdmin: %sender%\nServer: %server%\nID: #%id%"
tempban_player: "&c✖ You have been temporarily banned for %duration%.\nReason: %reason%\nAdmin: %sender%\nServer: %server%\nID: #%id%"

# ============================================================
#                      MUTES (MUTE / TEMPMUTE)
# ============================================================

mute_already: "%prefix%&cPlayer %target% is already muted."
not_muted: "%prefix%&cPlayer %target% is not muted."
